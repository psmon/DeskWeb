<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Whiteboard frame -->
  <rect x="4" y="6" width="56" height="42" rx="3" ry="3" fill="#ffffff" stroke="#4a90d9" stroke-width="2.5"/>
  <!-- Board stand -->
  <line x1="22" y1="48" x2="16" y2="58" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="48" x2="48" y2="58" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="54" x2="44" y2="54" stroke="#8B7355" stroke-width="2" stroke-linecap="round"/>
  <!-- Drawing elements on board -->
  <!-- Rectangle -->
  <rect x="10" y="12" width="18" height="12" rx="2" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.5"/>
  <!-- Circle -->
  <circle cx="45" cy="18" r="7" fill="#fce8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <!-- Arrow -->
  <line x1="30" y1="18" x2="36" y2="18" stroke="#333" stroke-width="1.5"/>
  <polygon points="37,18 34,15.5 34,20.5" fill="#333"/>
  <!-- Text lines -->
  <line x1="10" y1="32" x2="30" y2="32" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="37" x2="25" y2="37" stroke="#999" stroke-width="1" stroke-linecap="round"/>
  <!-- Star icon -->
  <polygon points="50,30 52,35 57,35 53,38 54,43 50,40 46,43 47,38 43,35 48,35" fill="#f1c40f" stroke="#e67e22" stroke-width="0.8"/>
</svg>
